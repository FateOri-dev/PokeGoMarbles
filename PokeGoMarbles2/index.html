<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050816" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Type Marbles" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>GO Type Marble Builder v9.9</title>
  <style>
    :root{
      --bg:#03040a;
      --panel:rgba(17,24,56,.88);
      --line:rgba(255,255,255,.15);
      --line2:rgba(255,255,255,.25);
      --text:#f8fbff;
      --muted:rgba(237,241,255,.72);
      --muted2:rgba(237,241,255,.52);
      --socket:rgba(255,255,255,.075);
      --socketHover:rgba(255,255,255,.18);
      --shadow:0 20px 70px rgba(0,0,0,.46);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ min-height:100%; margin:0; background:var(--bg); color:var(--text); font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body{
      background:
        radial-gradient(circle at 15% 0%, rgba(46,92,255,.26), transparent 30%),
        radial-gradient(circle at 90% 8%, rgba(185,80,255,.18), transparent 28%),
        radial-gradient(circle at 52% 100%, rgba(0,208,255,.10), transparent 30%),
        linear-gradient(180deg, #060817 0%, #060817 20%, #03040a 100%);
      overflow-x:hidden;
    }
    button{ border:0; color:inherit; font:inherit; cursor:pointer; }
    .app{
      width:min(780px,100%);
      margin:0 auto;
      padding:calc(10px + var(--safe-top)) 10px calc(18px + var(--safe-bottom));
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:5px 3px 10px;
    }
    h1{ margin:0; font-size:1.24rem; letter-spacing:-.025em; line-height:1; }
    .sub{ color:var(--muted2); font-weight:900; font-size:.75rem; margin-top:2px; }
    .toolbar{ display:flex; gap:8px; align-items:center; }
    .head-actions{ display:flex; align-items:center; gap:8px; }
    .head-add{
      width:42px;
      height:34px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line2);
      font-size:1.35rem;
      line-height:1;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .head-add:disabled{ opacity:.42; cursor:not-allowed; }
    .round-btn{
      width:42px; height:42px; border-radius:999px;
      display:inline-flex; align-items:center; justify-content:center;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      backdrop-filter: blur(14px);
      font-weight:1000;
    }
    .stack{ display:grid; gap:10px; }
    .glass{
      background:linear-gradient(180deg, rgba(31,42,92,.86), rgba(14,19,45,.88));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter: blur(18px);
    }
    .head{
      min-height:46px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:11px 13px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .head h2{
      margin:0;
      color:var(--muted);
      font-size:.75rem;
      text-transform:uppercase;
      letter-spacing:.11em;
      font-weight:1000;
    }
    .micro{ color:var(--muted2); font-weight:1000; font-size:.72rem; }
    .body{ padding:12px; }
    .hopper-wrap{
      position:relative;
      height:184px;
      border-radius:23px;
      background:
        radial-gradient(circle at 22% 26%, rgba(255,255,255,.08), transparent 25%),
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.12);
      overflow:hidden;
      touch-action:none;
    }
    canvas#hopperCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      touch-action:none;
    }
    .hopper-lip{
      position:absolute;
      left:0; right:0; bottom:18px;
      height:4px;
      border-radius:999px;
      background:rgba(255,255,255,.88);
      box-shadow:0 0 0 1px rgba(255,255,255,.12), 0 8px 20px rgba(255,255,255,.06);
      pointer-events:none;
    }
    .hopper-help{
      position:absolute;
      right:12px; bottom:0;
      transform:translateY(50%);
      color:rgba(255,255,255,.48);
      font-size:.62rem;
      font-weight:1000;
      letter-spacing:.08em;
      text-transform:uppercase;
      pointer-events:none;
    }
    .add-row{ display:flex; align-items:center; justify-content:center; padding:9px 0 1px; }
    .add-btn{
      width:60px; height:44px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line2);
      font-size:1.85rem;
      line-height:1;
      font-weight:800;
    }
    .add-btn:disabled{ opacity:.42; cursor:not-allowed; }
    .team-zone{
      min-height:236px;
      border-radius:23px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      padding:10px;
      display:grid;
      gap:9px;
    }
    .hint{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      color:var(--muted2);
      font-size:.68rem;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:1000;
      padding:0 4px 8px;
    }
    .member{
      display:grid;
      grid-template-columns:25px 1fr 32px;
      align-items:center;
      gap:7px;
      padding:8px;
      border-radius:20px;
      background:rgba(255,255,255,.055);
      border:1px solid rgba(255,255,255,.15);
    }
    .member.invalid{
      opacity:.78;
      border-style:dashed;
    }
    .member-num{
      width:25px; height:25px;
      border-radius:999px;
      display:flex;
      align-items:center; justify-content:center;
      background:rgba(255,255,255,.11);
      color:var(--muted);
      font-size:.68rem;
      font-weight:1000;
    }
    .bracket{
      display:grid;
      grid-template-columns:1fr 1fr 1px 1fr 1fr;
      gap:6px;
      align-items:center;
    }
    .divider{
      height:38px;
      width:1px;
      background:rgba(255,255,255,.28);
      border-radius:999px;
    }
    .socket{
      height:50px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
      transition:.12s ease;
      touch-action:none;
      border:1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(circle at 50% 50%, rgba(0,0,0,.32) 0 30%, rgba(0,0,0,.22) 43%, rgba(255,255,255,.055) 69%, rgba(255,255,255,.11) 100%),
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(0,0,0,.16));
      box-shadow:
        inset 0 3px 6px rgba(255,255,255,.08),
        inset 0 -9px 14px rgba(0,0,0,.36),
        inset 0 0 0 5px rgba(255,255,255,.025);
    }
    .socket::before{
      content:"";
      position:absolute;
      width:36px;
      height:36px;
      border-radius:50%;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:
        radial-gradient(circle at 50% 42%, rgba(0,0,0,.28), rgba(0,0,0,.18) 52%, rgba(255,255,255,.06) 75%, rgba(255,255,255,.11) 100%);
      box-shadow:
        inset 0 5px 8px rgba(0,0,0,.30),
        inset 0 -3px 5px rgba(255,255,255,.08),
        0 1px 2px rgba(255,255,255,.06);
      pointer-events:none;
    }
    .socket::after{
      content:"";
      position:absolute;
      width:38px;
      height:38px;
      border-radius:50%;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      border:1px solid rgba(255,255,255,.12);
      pointer-events:none;
    }
    .socket > *{
      position:relative;
      z-index:1;
    }
    .socket.hover{
      border-color:rgba(255,255,255,.52);
      transform:translateY(-1px) scale(1.025);
      background:
        radial-gradient(circle at 50% 50%, rgba(0,0,0,.26) 0 30%, rgba(0,0,0,.16) 43%, rgba(255,255,255,.085) 69%, rgba(255,255,255,.16) 100%),
        linear-gradient(180deg, rgba(255,255,255,.075), rgba(0,0,0,.16));
    }
    .socket.required.empty{
      border-color:rgba(255,209,102,.38);
    }
    .socket.optional .slot-tag{
      opacity:.54;
    }
    .slot-tag{
      position:absolute;
      bottom:2px;
      font-size:.48rem;
      font-weight:1000;
      letter-spacing:.07em;
      color:rgba(255,255,255,.45);
    }
    .delete{
      width:32px; height:32px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.13);
      color:rgba(255,255,255,.72);
      font-weight:1000;
    }
    .marble-dom{
      --size:34px;
      width:var(--size); height:var(--size);
      border-radius:50%;
      display:inline-flex;
      align-items:center; justify-content:center;
      position:relative;
      color:#fff;
      font-weight:1000;
      font-size:calc(var(--size) * .46);
      border:1.6px solid rgba(255,255,255,.94);
      box-shadow:
        inset -6px -8px 13px rgba(0,0,0,.28),
        inset 5px 6px 10px rgba(255,255,255,.20),
        0 6px 13px rgba(0,0,0,.25);
      text-shadow:0 1px 2px rgba(0,0,0,.45);
    }
    .marble-dom.tiny{ --size:24px; border-width:1.1px; }
    .marble-dom::before{
      content:"";
      position:absolute;
      top:17%; left:18%;
      width:31%; height:24%;
      border-radius:50%;
      background:rgba(255,255,255,.35);
      filter:blur(.2px);
    }
    .glyph{ position:relative; z-index:1; line-height:1; transform:translateY(-1px); }

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:7px;
      padding:10px 10px 0;
    }
    .tab{
      min-height:40px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.13);
      color:var(--muted);
      font-size:.74rem;
      font-weight:1000;
    }
    .tab.active{
      background:rgba(255,255,255,.16);
      color:#fff;
      border-color:rgba(255,255,255,.27);
    }
    .panel{
      display:none;
      padding:10px;
      gap:10px;
    }
    .panel.active{ display:grid; }
    .band{
      border-radius:20px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.045);
      overflow:hidden;
    }
    .band-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      padding:9px 11px;
      border-bottom:1px solid rgba(255,255,255,.09);
      color:var(--muted);
      font-weight:1000;
      font-size:.68rem;
      text-transform:uppercase;
      letter-spacing:.09em;
    }
    .grid{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      min-height:58px;
      padding:10px;
      align-content:flex-start;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      min-height:45px;
      padding:6px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.13);
    }
    .chip:active{ transform:scale(.98); }
    .badge{
      min-width:22px;
      height:22px;
      padding:0 6px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.18);
      color:#fff;
      font-size:.69rem;
      font-weight:1000;
      border:1px solid rgba(255,255,255,.14);
    }
    .mini-row{
      display:inline-flex;
      align-items:center;
      gap:3px;
    }
    .mini{
      width:19px; height:19px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:.53rem;
      font-weight:1000;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      color:#fff;
    }
    .empty-note{
      color:var(--muted2);
      padding:9px 2px;
      font-size:.8rem;
      font-weight:800;
    }
    .sheet-backdrop{
      position:fixed;
      inset:0;
      display:none;
      align-items:flex-end;
      background:rgba(0,0,0,.43);
      z-index:9000;
    }
    .sheet-backdrop.open{ display:flex; }
    .sheet{
      width:min(780px,100%);
      margin:0 auto;
      max-height:82vh;
      overflow:auto;
      border-radius:28px 28px 0 0;
      background:linear-gradient(180deg, rgba(33,44,96,.985), rgba(8,13,34,.985));
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 -20px 70px rgba(0,0,0,.46);
      padding:13px 13px calc(13px + var(--safe-bottom));
    }
    .sheet-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 3px 11px;
    }
    .sheet-title{ font-weight:1000; }
    .picker-grid{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      justify-items:center;
      gap:9px;
      padding:4px 0 10px;
    }
    .picker-marble{ background:transparent; padding:0; }
    .detail-list{ display:grid; gap:8px; margin-top:2px; }
    .detail-item{
      padding:10px 11px;
      border-radius:15px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      font-weight:800;
      color:var(--muted);
      line-height:1.35;
    }
    .detail-item strong{ color:#fff; }
    .sheet-actions{ display:flex; gap:8px; margin-top:10px; }
    .sheet-actions button{
      flex:1;
      min-height:43px;
      border-radius:16px;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.14);
      font-weight:1000;
    }
    .share-code{
      width:100%;
      min-height:80px;
      resize:vertical;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.22);
      color:#fff;
      padding:10px;
      font-size:.78rem;
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:calc(18px + var(--safe-bottom));
      transform:translateX(-50%);
      z-index:10000;
      pointer-events:none;
      opacity:0;
      transition:.18s ease;
      background:rgba(14,20,47,.96);
      border:1px solid rgba(255,255,255,.16);
      border-radius:999px;
      padding:10px 14px;
      font-weight:1000;
      box-shadow:0 12px 35px rgba(0,0,0,.35);
    }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }
    .drag-ghost{
      position:fixed;
      left:0;
      top:0;
      z-index:99999;
      pointer-events:none;
      transform:translate(-50%,-50%) scale(1.15);
      filter:drop-shadow(0 12px 18px rgba(0,0,0,.42));
    }

    .normal{ background:#A8A77A; color:#171717; }
    .fire{ background:#EE8130; }
    .water{ background:#6390F0; }
    .electric{ background:#F7D02C; color:#25220a; }
    .grass{ background:#7AC74C; color:#0d2808; }
    .ice{ background:#96D9D6; color:#0c3136; }
    .fighting{ background:#C22E28; }
    .poison{ background:#A33EA1; }
    .ground{ background:#E2BF65; color:#2d2108; }
    .flying{ background:#A98FF3; color:#1b1642; }
    .psychic{ background:#F95587; }
    .bug{ background:#A6B91A; color:#172500; }
    .rock{ background:#B6A136; color:#221f08; }
    .ghost{ background:#735797; }
    .dragon{ background:#6F35FC; }
    .dark{ background:#705746; }
    .steel{ background:#B7B7CE; color:#1c2130; }
    .fairy{ background:#D685AD; color:#421323; }


    .member.selected{
      border-color:rgba(255,255,255,.64);
      background:rgba(255,255,255,.105);
      box-shadow:0 0 0 2px rgba(255,255,255,.12), 0 0 26px rgba(150,180,255,.22);
    }
    .member.selected .member-num{
      background:#fff;
      color:#101630;
    }
    .chip.focused{
      background:rgba(255,255,255,.16);
      border-color:rgba(255,255,255,.54);
      box-shadow:0 0 0 2px rgba(255,255,255,.12), 0 0 20px rgba(150,180,255,.22);
    }
    .chip.dimmed{
      opacity:.30;
      filter:saturate(.7);
    }
    .mini.selected{
      background:#fff;
      color:#101630;
      border-color:#fff;
    }
    .type-icon,
    .type-icon-img{
      width:62%;
      height:62%;
      display:block;
      color:#fff;
      position:relative;
      z-index:1;
      filter:drop-shadow(0 1px 1px rgba(0,0,0,.32));
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }
    .type-icon *{
      vector-effect:none;
    }
    .rendered-marble{
      --size:34px;
      width:var(--size);
      height:var(--size);
      display:inline-block;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.22));
    }
    .rendered-marble.tiny{
      --size:24px;
    }
    .marble-dom .glyph{ display:none; }
    .sub:empty,.micro:empty,.hopper-help:empty{ display:none; }

    @media (max-width:420px){
      .app{ padding-left:8px; padding-right:8px; }
      .hopper-wrap{ height:176px; }
      .member{ grid-template-columns:23px 1fr 30px; gap:6px; padding:7px; }
      .socket{ height:44px; }
      .bracket{ gap:5px; }
      .delete{ width:30px; height:30px; }
      .picker-grid{ gap:7px; }
      .tab{ font-size:.69rem; }
      .band-title{ font-size:.64rem; }
      .marble-dom{ --size:31px; }
      .marble-dom.tiny{ --size:23px; }
      .rendered-marble{ --size:31px; }
      .rendered-marble.tiny{ --size:23px; }
    }
  
    /* v9.5 Wood + marble-board aesthetic overrides.
       Logic unchanged: this is styling only. */
    :root{
      --bg:#1a0e08;
      --text:#fff7e8;
      --muted:rgba(255,244,221,.78);
      --muted2:rgba(255,244,221,.58);
      --line:rgba(255,238,198,.22);
      --line2:rgba(255,238,198,.32);
      --wood-light:#c38343;
      --wood-mid:#9c5728;
      --wood-dark:#542916;
      --wood-deep:#281107;
      --wood-gold:#e2a55c;
      --shadow:0 22px 70px rgba(0,0,0,.48);
    }

    body{
      background:
        radial-gradient(circle at 12% 8%, rgba(255,190,95,.14), transparent 24%),
        radial-gradient(circle at 86% 4%, rgba(109,45,16,.42), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(0,0,0,.50), transparent 42%),
        repeating-linear-gradient(92deg,
          #3b1d0d 0px,
          #4f2812 14px,
          #713a1b 30px,
          #8d4b22 48px,
          #5d2e15 70px,
          #341709 86px);
      background-attachment:fixed;
    }

    .app{
      padding-top:calc(10px + var(--safe-top));
    }

    .glass{
      position:relative;
      background:
        radial-gradient(circle at 18% 8%, rgba(255,220,156,.16), transparent 23%),
        radial-gradient(circle at 88% 95%, rgba(55,20,8,.22), transparent 34%),
        repeating-linear-gradient(90deg,
          var(--wood-light) 0px,
          #b16d35 18px,
          var(--wood-mid) 38px,
          #6e3619 54px,
          #b97237 76px,
          #d18d4a 96px);
      border:1px solid rgba(255,225,173,.30);
      border-radius:28px;
      box-shadow:
        inset 0 1px 0 rgba(255,230,185,.28),
        inset 0 -8px 22px rgba(60,22,7,.28),
        0 22px 70px rgba(0,0,0,.48);
      overflow:hidden;
    }

    .glass::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,0) 24%, rgba(0,0,0,.15) 100%),
        repeating-linear-gradient(7deg, rgba(255,255,255,.025) 0 2px, rgba(0,0,0,.018) 2px 6px);
      pointer-events:none;
      mix-blend-mode:soft-light;
    }

    .head{
      position:relative;
      z-index:1;
      min-height:50px;
      background:
        linear-gradient(180deg, rgba(255,225,170,.14), rgba(75,31,12,.18)),
        repeating-linear-gradient(90deg, rgba(255,245,214,.06) 0 12px, rgba(0,0,0,.035) 12px 30px);
      border-bottom:1px solid rgba(70,26,9,.35);
      box-shadow:
        inset 0 1px 0 rgba(255,238,196,.20),
        inset 0 -2px 5px rgba(0,0,0,.12);
    }

    .head h2{
      color:#fff2cf;
      text-shadow:0 1px 2px rgba(43,16,4,.58);
      letter-spacing:.12em;
    }

    .body,
    .panel,
    .tabs{
      position:relative;
      z-index:1;
    }

      background:

        linear-gradient(90deg, rgba(255,245,210,.030), rgba(0,0,0,.018) 40%, rgba(255,235,188,.026));
    }

    .hopper-wrap,
    .team-zone{
      background:
        radial-gradient(ellipse at 50% 24%, rgba(255,230,176,.075), transparent 34%),
        var(--wood-grain-lines),
        var(--wood-base);
      background-size:auto, 100% 24px, 100% 100%;
      background-position:center, top left, center;
      border-color:rgba(70,26,9,.32);
    }

    .team-zone{
      position:relative;
      align-content:start;
      grid-auto-rows:min-content;
      overflow:hidden;
      box-shadow:
        inset 0 8px 14px rgba(255,220,157,.10),
        inset 0 -16px 24px rgba(48,17,5,.24);
    }

    .team-zone::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:26px;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.018), rgba(0,0,0,.014) 38%, rgba(255,255,255,.016) 65%, rgba(0,0,0,.012));
      mix-blend-mode:soft-light;
      opacity:.55;
    }

    .member{
      min-height:66px;
      max-height:66px;
      align-self:start;
      grid-template-columns:28px minmax(0,1fr) 30px;
      align-items:center;
      column-gap:8px;
      padding:8px 9px;
      border-radius:999px;
      background:
        radial-gradient(ellipse at 50% 18%, rgba(255,239,202,.20), transparent 47%),
        linear-gradient(180deg, #d39a59 0%, #b87038 48%, #88411d 100%);
      border-color:rgba(255,235,190,.36);
      box-shadow:
        inset 0 1px 0 rgba(255,250,225,.28),
        inset 0 -6px 10px rgba(54,19,6,.18),
        0 4px 10px rgba(35,12,3,.20);
    }

    .member::before{
      background:
        repeating-linear-gradient(0deg,
          rgba(255,244,214,.042) 0 1px,
          transparent 1px 11px,
          rgba(0,0,0,.013) 11px 12px),
        linear-gradient(90deg, rgba(255,255,255,.028), rgba(0,0,0,.016) 34%, rgba(255,255,255,.024) 62%, rgba(0,0,0,.016));
      opacity:.72;
    }

    .member::after{
      inset:3px;
      border-radius:999px;
      box-shadow:
        inset 0 4px 7px rgba(255,237,192,.08),
        inset 0 -5px 8px rgba(44,14,4,.13);
    }

    .member.selected{
      background:
        radial-gradient(ellipse at 50% 18%, rgba(255,246,218,.25), transparent 48%),
        linear-gradient(180deg, #e0a768 0%, #bd763d 48%, #934921 100%);
      border-color:rgba(255,241,208,.48);
    }

    .bracket{
      height:50px;
      align-items:center;
      padding:1px;
      border-radius:999px;
      background:
        linear-gradient(180deg, rgba(72,26,8,.09), rgba(255,232,179,.035));
      box-shadow:
        inset 0 2px 5px rgba(47,15,4,.10),
        inset 0 -1px 2px rgba(255,232,179,.035);
    }

    .member-num,
    .delete{
      align-self:center;
      justify-self:center;
    }

    .socket{
      height:46px;
      align-self:center;
      border-color:rgba(68,27,10,.30);
      background:
        radial-gradient(circle at 50% 54%,
          rgba(48,17,6,.36) 0 25%,
          rgba(76,31,11,.30) 39%,
          rgba(146,76,35,.22) 63%,
          rgba(255,226,164,.13) 100%),
        linear-gradient(180deg, rgba(255,232,181,.10), rgba(45,15,4,.17));
      box-shadow:
        inset 0 5px 9px rgba(0,0,0,.32),
        inset 0 -4px 8px rgba(255,218,150,.08),
        inset 0 0 0 4px rgba(67,26,8,.08);
    }

    .socket::before{
      width:38px;
      height:38px;
      background:
        radial-gradient(circle at 34% 24%, rgba(255,248,225,.16), rgba(255,248,225,.045) 14%, transparent 24%),
        radial-gradient(circle at 50% 58%, rgba(36,12,4,.34), rgba(46,17,6,.28) 50%, rgba(122,61,27,.16) 72%, rgba(255,232,179,.13) 100%);
      box-shadow:
        inset 0 7px 11px rgba(0,0,0,.32),
        inset 0 -4px 7px rgba(255,226,164,.09),
        0 1px 1px rgba(255,245,220,.07);
    }

    .socket::after{
      width:40px;
      height:40px;
      border-color:rgba(255,232,180,.13);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.08),
        0 0 0 1px rgba(48,17,5,.14);
    }

    .socket.hover{
      border-color:rgba(255,237,192,.55);
      transform:translateY(-1px) scale(1.022);
      background:
        radial-gradient(circle at 50% 54%,
          rgba(48,17,6,.30) 0 25%,
          rgba(76,31,11,.24) 39%,
          rgba(155,83,40,.25) 63%,
          rgba(255,236,190,.17) 100%),
        linear-gradient(180deg, rgba(255,232,181,.13), rgba(45,15,4,.15));
    }

    .slot-tag{
      color:rgba(255,238,202,.50);
    }

    .round-btn,
    .head-add,
    .tab,
    .sheet-actions button{
      background:
        radial-gradient(circle at 30% 18%, rgba(255,240,197,.28), transparent 34%),
        linear-gradient(180deg, #c58445, #88431d 58%, #5a260d);
    }

    .band{
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,228,170,.10), transparent 34%),
        linear-gradient(180deg, rgba(83,35,13,.28), rgba(35,12,4,.24));
    }

  </style>
</head>
<body>
  <main class="app">
    <div class="stack">
      <section class="glass">
        <div class="head">
          <h2>Hopper</h2>
          <div class="head-actions">
            <button class="round-btn" id="refillBtn" title="Refill hopper">↻</button>
            <button class="round-btn" id="shareBtn" title="Team code">↗</button>
          </div>
        </div>
        <div class="body">
          <div class="hopper-wrap" id="hopperWrap">
            <canvas id="hopperCanvas"></canvas>
            <div class="hopper-lip"></div>
            <div class="hopper-help"></div>
          </div>
        </div>
      </section>

      <section class="glass">
        <div class="head">
          <h2>Party</h2>
          <div class="head-actions">
            <span id="partyCount" class="micro">0/6</span>
            <button class="head-add" id="addBtn" aria-label="Add party member">+</button>
          </div>
        </div>
        <div class="body">
          
          <div id="teamZone" class="team-zone"></div>
        </div>
      </section>

      <section class="glass">
        <div class="tabs">
          <button class="tab active" data-tab="takeMore">Take +</button>
          <button class="tab" data-tab="takeLess">Take −</button>
          <button class="tab" data-tab="dealMore">Deal +</button>
          <button class="tab" data-tab="dealLess">Deal −</button>
        </div>

        <div id="takeMore" class="panel active">
          <div class="band">
            <div class="band-title"><span>Take very more from</span><span>2.56×</span></div>
            <div class="grid" id="takeVeryMore"></div>
          </div>
          <div class="band">
            <div class="band-title"><span>Take more from</span><span>1.6×</span></div>
            <div class="grid" id="takeMoreGrid"></div>
          </div>
        </div>

        <div id="takeLess" class="panel">
          <div class="band">
            <div class="band-title"><span>Take way less from</span><span>≤0.391×</span></div>
            <div class="grid" id="takeWayLess"></div>
          </div>
          <div class="band">
            <div class="band-title"><span>Take less from</span><span>0.625×</span></div>
            <div class="grid" id="takeLessGrid"></div>
          </div>
        </div>

        <div id="dealMore" class="panel">
          <div class="band">
            <div class="band-title"><span>Deal more to</span><span>single types</span></div>
            <div class="grid" id="dealMoreGrid"></div>
          </div>
          <div class="band">
            <div class="band-title"><span>Deal very more to</span><span>dual combos</span></div>
            <div class="grid" id="dealVeryMoreCombos"></div>
          </div>
        </div>

        <div id="dealLess" class="panel">
          <div class="band">
            <div class="band-title"><span>Team poor into</span><span>best hit &lt;1×</span></div>
            <div class="grid" id="teamPoorInto"></div>
          </div>
          <div class="band">
            <div class="band-title"><span>Attacks resisted by</span><span>overlap count</span></div>
            <div class="grid" id="attacksResistedBy"></div>
          </div>
          <div class="band">
            <div class="band-title"><span>Hard resisted combos</span><span>dual types</span></div>
            <div class="grid" id="hardResistedCombos"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="pickerBackdrop" class="sheet-backdrop">
    <div class="sheet">
      <div class="sheet-head">
        <div class="sheet-title" id="pickerTitle">Choose type</div>
        <button class="round-btn" id="closePicker">×</button>
      </div>
      <div id="pickerGrid" class="picker-grid"></div>
      <div class="sheet-actions">
        <button id="clearSlot">Clear</button>
        <button id="cancelPicker">Cancel</button>
      </div>
    </div>
  </div>

  <div id="detailBackdrop" class="sheet-backdrop">
    <div class="sheet">
      <div class="sheet-head">
        <div class="sheet-title" id="detailTitle">Details</div>
        <button class="round-btn" id="closeDetail">×</button>
      </div>
      <div id="detailList" class="detail-list"></div>
    </div>
  </div>

  <div id="shareBackdrop" class="sheet-backdrop">
    <div class="sheet">
      <div class="sheet-head">
        <div class="sheet-title">Team code</div>
        <button class="round-btn" id="closeShare">×</button>
      </div>
      <textarea id="teamCode" class="share-code"></textarea>
      <div class="sheet-actions">
        <button id="copyCode">Copy</button>
        <button id="loadCode">Load pasted code</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

    function resizeCanvas(){

      const dpr = DPR();
      canvas.width = Math.round(W * dpr);

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      wakePhysics();

    function makeMarble(type, x=null, y=null){
      return {
        id: ++marbleId,
        type,
        x: x ?? (R + Math.random() * (W - 2*R)),
        y: y ?? (-R - Math.random() * H * 0.45),
        vx: (Math.random() - .5) * 2,
        vy: Math.random() * 1.2,
        r: R,
        grabbed: false
      };
    }

    function refillHopper(reset=false){
      if(reset) marbles = [];
      let added = 0;
      for(const type of TYPES){
        const have = marbles.filter(m => m.type === type && !m.grabbed).length;
        for(let i=have; i<GOAL_PER_TYPE; i++){
          marbles.push(makeMarble(type));
          added++;
        }
      }
      if(added || reset) wakePhysics();
    }

    function canSleep(){
      const bottom = H - 22;
      for(const m of marbles){
        if(m.grabbed) return false;
        if(Math.abs(m.vx) > 1.2 || Math.abs(m.vy) > 1.2) return false;
        if(m.y < bottom - m.r - 3) return false;
      }
      return true;
    }

    function wakePhysics(){
      stillFrames = 0;
      lastT = performance.now();
      if(animationHandle == null){
        animationHandle = requestAnimationFrame(loop);
      }
    }

    function physicsStep(dt){
      dt = Math.min(dt, 0.026);
      const substeps = 2;
      const h = dt / substeps;
      const gravity = 620;
      const bottom = H - 22;
      const wallBounce = 0.05;
      const settleSpeed = 7;

      for(let step=0; step<substeps; step++){
        for(const m of marbles){
          if(m.grabbed) continue;
          m.vy += gravity * h;
          m.x += m.vx * h;
          m.y += m.vy * h;
          m.vx *= 0.988;
          m.vy *= 0.992;

          if(m.x < m.r){ m.x = m.r; m.vx = Math.abs(m.vx) * wallBounce; }
          if(m.x > W - m.r){ m.x = W - m.r; m.vx = -Math.abs(m.vx) * wallBounce; }
          if(m.y > bottom - m.r){
            m.y = bottom - m.r;
            if(Math.abs(m.vy) < 65) m.vy = 0;
            else m.vy = -Math.abs(m.vy) * 0.06;
            m.vx *= 0.82;
          }
          if(m.y < -H){ m.y = -m.r; m.vy = Math.abs(m.vy); }
        }

        // Several position-solver passes reduce clipping and jitter in the dense hopper.
        for(let iter=0; iter<7; iter++){
          for(let i=0; i<marbles.length; i++){
            const a = marbles[i];
            if(a.grabbed) continue;
            for(let j=i+1; j<marbles.length; j++){
              const b = marbles[j];
              if(b.grabbed) continue;
              let dx = b.x - a.x;
              let dy = b.y - a.y;
              let dist2 = dx*dx + dy*dy;
              const minD = a.r + b.r + 0.2;
              if(dist2 === 0){
                dx = (Math.random() - .5) * 0.01;
                dy = (Math.random() - .5) * 0.01;
                dist2 = dx*dx + dy*dy;
              }
              if(dist2 < minD*minD){
                const dist = Math.sqrt(dist2);
                const nx = dx / dist;
                const ny = dy / dist;
                const overlap = minD - dist;
                a.x -= nx * overlap * .5;
                a.y -= ny * overlap * .5;
                b.x += nx * overlap * .5;
                b.y += ny * overlap * .5;

                const rvx = b.vx - a.vx;
                const rvy = b.vy - a.vy;
                const rel = rvx * nx + rvy * ny;
                if(rel < 0){
                  const impulse = -(1 + 0.04) * rel / 2;
                  a.vx -= impulse * nx;
                  a.vy -= impulse * ny;
                  b.vx += impulse * nx;
                  b.vy += impulse * ny;
                }
              }
            }
          }

          for(const m of marbles){
            if(m.grabbed) continue;
            if(m.x < m.r) m.x = m.r;
            if(m.x > W - m.r) m.x = W - m.r;
            if(m.y > bottom - m.r) m.y = bottom - m.r;
          }
        }

        for(const m of marbles){
          if(m.grabbed) continue;
          if(Math.abs(m.vx) < settleSpeed) m.vx = 0;
          if(Math.abs(m.vy) < settleSpeed && m.y > bottom - m.r - 2) m.vy = 0;
        }
      }
    }

    function drawMarbleCanvas(m){
      ctx.save();
      ctx.translate(m.x, m.y);

      ctx.beginPath();
      ctx.arc(0, 0, m.r, 0, Math.PI * 2);
      ctx.fillStyle = COLORS[m.type];
      ctx.fill();

      const grad = ctx.createRadialGradient(-m.r*.35, -m.r*.35, m.r*.2, 0, 0, m.r);
      grad.addColorStop(0, "rgba(255,255,255,.36)");
      grad.addColorStop(.45, "rgba(255,255,255,.06)");
      grad.addColorStop(1, "rgba(0,0,0,.32)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, m.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,.92)";
      ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(-m.r*.34, -m.r*.36, m.r*.28, m.r*.18, -0.35, 0, Math.PI*2);
      ctx.fillStyle = "rgba(255,255,255,.42)";
      ctx.fill();

      drawTypeIcon(ctx, m.type, m.r * .66);
      ctx.restore();
    }

    const DOM_MARBLE_SRC = {};

    function drawStaticMarble(targetCtx, type, cx, cy, r){
      targetCtx.save();
      targetCtx.translate(cx, cy);

      targetCtx.beginPath();
      targetCtx.arc(0, 0, r, 0, Math.PI * 2);
      targetCtx.fillStyle = COLORS[type];
      targetCtx.fill();

      const grad = targetCtx.createRadialGradient(-r*.35, -r*.35, r*.2, 0, 0, r);
      grad.addColorStop(0, "rgba(255,255,255,.36)");
      grad.addColorStop(.45, "rgba(255,255,255,.06)");
      grad.addColorStop(1, "rgba(0,0,0,.32)");
      targetCtx.fillStyle = grad;
      targetCtx.beginPath();
      targetCtx.arc(0, 0, r, 0, Math.PI * 2);
      targetCtx.fill();

      targetCtx.lineWidth = Math.max(1.8, r * .105);
      targetCtx.strokeStyle = "rgba(255,255,255,.92)";
      targetCtx.stroke();

      targetCtx.beginPath();
      targetCtx.ellipse(-r*.34, -r*.36, r*.28, r*.18, -0.35, 0, Math.PI*2);
      targetCtx.fillStyle = "rgba(255,255,255,.42)";
      targetCtx.fill();

      drawTypeIcon(targetCtx, type, r * .66);
      targetCtx.restore();
    }

    function rebuildDomMarbleSources(){
      for(const type of TYPES){
        const size = 96;
        const c = document.createElement("canvas");
        c.width = size;
        c.height = size;
        const cctx = c.getContext("2d");
        drawStaticMarble(cctx, type, size/2, size/2, size*.42);
        DOM_MARBLE_SRC[type] = c.toDataURL("image/png");
      }
    }

    function draw(){
      ctx.clearRect(0,0,W,H);

      // Subtle plinko pins.
      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,.10)";
      for(let row=0; row<3; row++){
        const y = 34 + row*32;
        const offset = row % 2 ? 28 : 0;
        for(let x=26+offset; x<W; x+=56){
          ctx.beginPath();
          ctx.arc(x, y, 2.2, 0, Math.PI*2);
          ctx.fill();
        }
      }
      ctx.restore();

      for(const m of marbles){
        if(!m.grabbed) drawMarbleCanvas(m);
      }
    }

    function loop(now){
      const dt = Math.min((now - lastT) / 1000, 0.024);
      lastT = now;
      physicsStep(dt);
      draw();

      if(canSleep()){
        stillFrames++;
        if(stillFrames >= SLEEP_AFTER_FRAMES){
          stillFrames = 0;
          animationHandle = null;
          draw();
          return;
        }
      } else {
        stillFrames = 0;
      }

      animationHandle = requestAnimationFrame(loop);
    }

    function canvasPoint(e){
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top, rect: r };
    }

    function pickMarble(x,y){
      for(let i=marbles.length-1; i>=0; i--){
        const m = marbles[i];
        const dx = x - m.x, dy = y - m.y;
        if(dx*dx + dy*dy <= m.r*m.r) return m;
      }
      return null;
    }

    function pointerDown(e){
      const p = canvasPoint(e);
      const m = pickMarble(p.x, p.y);
      if(!m) return;
      e.preventDefault();
      canvas.setPointerCapture?.(e.pointerId);
      const ghost = document.createElement("div");
      ghost.className = "drag-ghost";
      ghost.innerHTML = domMarble(m.type);
      document.body.appendChild(ghost);

      dragging = m;
      dragging.ghost = ghost;
      wakePhysics();
      m.grabbed = true;
      m.vx = 0; m.vy = 0;
      m.pointerId = e.pointerId;
      m.screenX = p.x;
      m.screenY = p.y;
      m.outside = false;
      moveDragGhost(e);
    }

    function pointerMove(e){
      if(!dragging || dragging.pointerId !== e.pointerId) return;
      e.preventDefault();
      const p = canvasPoint(e);
      dragging.x = p.x;
      dragging.y = p.y;
      dragging.screenX = p.x;
      dragging.screenY = p.y;
      dragging.outside = p.x < 0 || p.x > W || p.y < 0 || p.y > H;
      moveDragGhost(e);
      $$(".socket.hover").forEach(el => el.classList.remove("hover"));
      const target = socketAt(e.clientX, e.clientY);
      if(target) target.classList.add("hover");
    }

    function pointerUp(e){
      if(!dragging || dragging.pointerId !== e.pointerId) return;
      const target = socketAt(e.clientX, e.clientY);
      const type = dragging.type;

      // Remove the dragged marble from hopper if it lands in a socket.
      if(target){
        marbles = marbles.filter(m => m.id !== dragging.id);
        setSocket(Number(target.dataset.member), target.dataset.field, type);
        refillHopper(false);
      } else {
        dragging.grabbed = false;
        dragging.vx = (Math.random() - .5) * 90;
        dragging.vy = -60;
        if(dragging.x < R) dragging.x = R;
        if(dragging.x > W - R) dragging.x = W - R;
        if(dragging.y < R) dragging.y = R;
      }

      if(dragging && dragging.ghost){
        dragging.ghost.remove();
      }
      dragging = null;
      wakePhysics();
      $$(".socket.hover").forEach(el => el.classList.remove("hover"));
    }

    function socketAt(x,y){
      return $$(".socket").find(s => {
        const r = s.getBoundingClientRect();
        return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
      });
    }

    function moveDragGhost(e){
      if(!dragging || !dragging.ghost) return;
      dragging.ghost.style.left = `${e.clientX}px`;
      dragging.ghost.style.top = `${e.clientY}px`;
    }

    function beginSocketPointer(e){
      const socketEl = e.target.closest(".socket");
      if(!socketEl || !socketEl.dataset.type) return;
      if(e.pointerType === "mouse" && e.button !== 0) return;

      socketDrag = {
        pointerId:e.pointerId,
        startX:e.clientX,
        startY:e.clientY,
        member:Number(socketEl.dataset.member),
        field:socketEl.dataset.field,
        type:socketEl.dataset.type,
        ghost:null,
        active:false
      };
    }

    function startSocketDrag(e){
      if(!socketDrag || socketDrag.active) return;
      const ghost = document.createElement("div");
      ghost.className = "drag-ghost";
      ghost.innerHTML = domMarble(socketDrag.type);
      document.body.appendChild(ghost);
      socketDrag.ghost = ghost;
      socketDrag.active = true;
      suppressNextClick = true;
      moveSocketGhost(e);
    }

    function moveSocketGhost(e){
      if(!socketDrag || !socketDrag.ghost) return;
      socketDrag.ghost.style.left = `${e.clientX}px`;
      socketDrag.ghost.style.top = `${e.clientY}px`;
    }

    function moveSocketPointer(e){
      if(!socketDrag || socketDrag.pointerId !== e.pointerId) return;
      const dx = e.clientX - socketDrag.startX;
      const dy = e.clientY - socketDrag.startY;

      if(!socketDrag.active && Math.hypot(dx, dy) > 8){
        e.preventDefault();
        startSocketDrag(e);
      }

      if(!socketDrag.active) return;
      e.preventDefault();
      moveSocketGhost(e);
      $$(".socket.hover").forEach(el => el.classList.remove("hover"));
      const target = socketAt(e.clientX, e.clientY);
      if(target) target.classList.add("hover");
    }

    function endSocketPointer(e){
      if(!socketDrag || socketDrag.pointerId !== e.pointerId) return;

      if(socketDrag.active){
        e.preventDefault();
        const target = socketAt(e.clientX, e.clientY);
        const type = socketDrag.type;

        if(target){
          const toMember = Number(target.dataset.member);
          const toField = target.dataset.field;
          const sameSlot = toMember === socketDrag.member && toField === socketDrag.field;

          if(!sameSlot){
            if(toField === "type2" && team[toMember]?.type1 === type){
              toast("Type 2 cannot match Type 1");
            } else {
              clearSocket(socketDrag.member, socketDrag.field);
              setSocket(toMember, toField, type);
            }
          }
        } else {
          clearSocket(socketDrag.member, socketDrag.field);
          toast("Removed marble");
        }

        if(socketDrag.ghost) socketDrag.ghost.remove();
        $$(".socket.hover").forEach(el => el.classList.remove("hover"));

        setTimeout(() => {
          suppressNextClick = false;
        }, 0);
      }

      socketDrag = null;
    }

    function domMarble(type, tiny=false){
      const src = DOM_MARBLE_SRC[type];
      if(src){
        return `<img class="rendered-marble ${tiny ? "tiny":""}" alt="${type}" title="${type}" src="${src}">`;
      }
      const inner = IMAGE_TYPE_ICON[type]
        ? `<img class="type-icon-img" alt="" src="${IMAGE_TYPE_ICON[type]}">`
        : TYPE_ICON[type];
      return `<span class="marble-dom ${tiny ? "tiny":""} ${cls(type)}" title="${type}">${inner}</span>`;
    }

    function pokemonGoRelation(rel){
      if(rel === 2) return EFFECT.super;
      if(rel === .5) return EFFECT.resist;
      if(rel === 0) return EFFECT.immune;
      return 1;
    }

    function mult(attackType, defenderTypes){
      const value = defenderTypes.filter(Boolean).reduce((m, defType) => {
        return m * pokemonGoRelation(CHART[attackType]?.[defType] ?? 1);
      }, 1);
      return Math.round(value * 1000000) / 1000000;
    }

    function fmt(v){
      if(v === 2.56) return "2.56×";
      if(v === 1.6) return "1.6×";
      if(v === 1) return "1×";
      if(v === 0.625) return "0.625×";
      if(v === 0.390625) return "0.391×";
      return `${Number(v.toFixed(3))}×`;
    }

    function defTypes(member){ return [member.type1, member.type2].filter(Boolean); }
    function valid(m){ return Boolean(m.type1 && m.quick && m.charged); }
    function activeMembers(){ return team.map((m,i)=>({...m,index:i})).filter(valid); }

    function focusClass(indices){
      if(selectedMember === null) return "";
      return indices.includes(selectedMember) ? "focused" : "dimmed";
    }

    function mini(indices){
      return `<span class="mini-row">${indices.map(i=>`<span class="mini ${i === selectedMember ? "selected" : ""}">M${i+1}</span>`).join("")}</span>`;
    }

    function chip(type, count, indices, detail){
      const id = registerDetail(detail);
      return `<button class="chip ${focusClass(indices)}" data-detail="${id}" data-members="${indices.join(',')}">${domMarble(type)}<span class="badge">${count}</span>${mini(indices)}</button>`;
    }

    function comboChip(combo, label, detail, indices=[]){
      const id = registerDetail(detail);
      return `<button class="chip ${focusClass(indices)}" data-detail="${id}" data-members="${indices.join(',')}">${combo.map(t=>domMarble(t,true)).join("")}<span class="badge">${label}</span>${indices.length ? mini(indices) : ""}</button>`;
    }

    function registerDetail(detail){
      const id = `d${++detailCounter}`;
      details.set(id, detail);
      return id;
    }

    function memberName(m){
      const typePart = `${m.type1 || "?"}${m.type2 ? "/" + m.type2 : ""}`;
      return `M${m.index + 1} (${typePart} | ${m.quick || "?"}/${m.charged || "?"})`;
    }

    function bestAttackInto(member, defenderCombo){
      const q = mult(member.quick, defenderCombo);
      const c = mult(member.charged, defenderCombo);
      if(c > q) return { slot:"charged", type:member.charged, value:c };
      return { slot:"quick", type:member.quick, value:q };
    }

    function allCombos(){
      const combos = TYPES.map(t => [t]);
      for(let i=0;i<TYPES.length;i++){
        for(let j=i+1;j<TYPES.length;j++) combos.push([TYPES[i], TYPES[j]]);
      }
      return combos;
    }

    function socket(i, field, type, label, required, optional){
      return `<button class="socket ${required ? "required" : ""} ${optional ? "optional" : ""} ${required && !type ? "empty" : ""}" data-member="${i}" data-field="${field}" data-type="${type || ""}">
        ${type ? domMarble(type) : ""}
        <span class="slot-tag">${label}</span>
      </button>`;
    }

    function renderTeam(){
      $("#partyCount").textContent = `${team.length}/6`;
      $("#addBtn").disabled = team.length >= 6;
      const zone = $("#teamZone");
      if(team.length === 0){
        zone.innerHTML = `<div class="empty-note">Tap + to add a party slot.</div>`;
        return;
      }

      zone.innerHTML = team.map((m,i) => `
        <div class="member ${valid(m) ? "" : "invalid"} ${selectedMember === i ? "selected" : ""}" data-member="${i}">
          <div class="member-num">M${i+1}</div>
          <div class="bracket">
            ${socket(i,"type1",m.type1,"T1",true,false)}
            ${socket(i,"type2",m.type2,"T2",false,true)}
            <div class="divider"></div>
            ${socket(i,"quick",m.quick,"Q",true,false)}
            ${socket(i,"charged",m.charged,"C",true,false)}
          </div>
          <button class="delete" data-delete="${i}" aria-label="Remove member">×</button>
        </div>
      `).join("");
    }

    function empty(id, text){
      const el = document.getElementById(id);
      if(!el.children.length) el.innerHTML = `<div class="empty-note">${text}</div>`;
    }

    function renderAnalysis(){
      details = new Map();
      detailCounter = 0;

      const ids = [
        "takeVeryMore","takeMoreGrid","takeWayLess","takeLessGrid",
        "dealMoreGrid","dealVeryMoreCombos","teamPoorInto","attacksResistedBy","hardResistedCombos"
      ];
      ids.forEach(id => document.getElementById(id).innerHTML = "");

      const members = activeMembers();
      if(!members.length){
        ids.forEach(id => document.getElementById(id).innerHTML = `<div class="empty-note">Fill Type 1, Quick, and Charged to activate a slot.</div>`);
        return;
      }

      const takeVery = [];
      const takeMore = [];
      const takeWayLess = [];
      const takeLess = [];

      for(const attackType of TYPES){
        const a = [], b = [], c = [], d = [];
        for(const m of members){
          const value = mult(attackType, defTypes(m));
          if(value >= 2.56) a.push({m,value});
          else if(value > 1) b.push({m,value});
          else if(value <= 0.390625) c.push({m,value});
          else if(value < 1) d.push({m,value});
        }
        if(a.length) takeVery.push({type:attackType, rows:a});
        if(b.length) takeMore.push({type:attackType, rows:b});
        if(c.length) takeWayLess.push({type:attackType, rows:c});
        if(d.length) takeLess.push({type:attackType, rows:d});
      }

      const sortRows = (x,y) => y.rows.length - x.rows.length || x.type.localeCompare(y.type);
      takeVery.sort(sortRows); takeMore.sort(sortRows); takeWayLess.sort(sortRows); takeLess.sort(sortRows);

      $("#takeVeryMore").innerHTML = takeVery.map(x => chip(x.type, x.rows.length, x.rows.map(r=>r.m.index), {
        title:`Take 2.56× from ${x.type}`,
        rows:x.rows.map(r => `<strong>${memberName(r.m)}</strong> takes <strong>${fmt(r.value)}</strong> from ${x.type}.`)
      })).join("");
      $("#takeMoreGrid").innerHTML = takeMore.map(x => chip(x.type, x.rows.length, x.rows.map(r=>r.m.index), {
        title:`Take 1.6× from ${x.type}`,
        rows:x.rows.map(r => `<strong>${memberName(r.m)}</strong> takes <strong>${fmt(r.value)}</strong> from ${x.type}.`)
      })).join("");
      $("#takeWayLess").innerHTML = takeWayLess.map(x => chip(x.type, x.rows.length, x.rows.map(r=>r.m.index), {
        title:`Take reduced damage from ${x.type}`,
        rows:x.rows.map(r => `<strong>${memberName(r.m)}</strong> takes <strong>${fmt(r.value)}</strong> from ${x.type}.`)
      })).join("");
      $("#takeLessGrid").innerHTML = takeLess.map(x => chip(x.type, x.rows.length, x.rows.map(r=>r.m.index), {
        title:`Take 0.625× from ${x.type}`,
        rows:x.rows.map(r => `<strong>${memberName(r.m)}</strong> takes <strong>${fmt(r.value)}</strong> from ${x.type}.`)
      })).join("");

      empty("takeVeryMore","No 2.56× incoming weaknesses.");
      empty("takeMoreGrid","No 1.6× incoming weaknesses.");
      empty("takeWayLess","No heavy resistances yet.");
      empty("takeLessGrid","No 0.625× resistances yet.");

      const dealMoreSingle = [];
      const teamPoorSingle = [];
      const attacksResisted = [];

      for(const defenderType of TYPES){
        const strongContrib = [];
        const resistedContrib = [];
        let teamBest = 0;
        let bestRows = [];
        for(const m of members){
          const best = bestAttackInto(m, [defenderType]);
          teamBest = Math.max(teamBest, best.value);
          if(best.value > 1) strongContrib.push({m,best});
          if(best.value < 1) resistedContrib.push({m,best});
        }

        if(strongContrib.length) dealMoreSingle.push({type:defenderType, rows:strongContrib});
        if(resistedContrib.length) attacksResisted.push({type:defenderType, rows:resistedContrib});

        if(teamBest < 1){
          for(const m of members){
            const best = bestAttackInto(m, [defenderType]);
            if(best.value === teamBest) bestRows.push({m,best});
          }
          teamPoorSingle.push({type:defenderType, rows:bestRows, teamBest});
        }
      }

      dealMoreSingle.sort(sortRows);
      attacksResisted.sort(sortRows);
      teamPoorSingle.sort((a,b) => a.teamBest - b.teamBest || a.type.localeCompare(b.type));

      $("#dealMoreGrid").innerHTML = dealMoreSingle.map(x => chip(x.type, x.rows.length, x.rows.map(r=>r.m.index), {
        title:`Deal more to ${x.type}`,
        rows:x.rows.map(r => `<strong>${memberName(r.m)}</strong> uses ${r.best.slot} <strong>${r.best.type}</strong> for <strong>${fmt(r.best.value)}</strong> into ${x.type}.`)
      })).join("");

      $("#teamPoorInto").innerHTML = teamPoorSingle.map(x => chip(x.type, x.rows.length, x.rows.map(r=>r.m.index), {
        title:`Team poor into ${x.type}`,
        rows:x.rows.map(r => `<strong>${memberName(r.m)}</strong>'s best hit is ${r.best.slot} <strong>${r.best.type}</strong> at <strong>${fmt(r.best.value)}</strong> into ${x.type}.`)
      })).join("");

      $("#attacksResistedBy").innerHTML = attacksResisted.map(x => chip(x.type, x.rows.length, x.rows.map(r=>r.m.index), {
        title:`Attacks resisted by ${x.type}`,
        rows:x.rows.map(r => `<strong>${memberName(r.m)}</strong>'s best hit is ${r.best.slot} <strong>${r.best.type}</strong> at <strong>${fmt(r.best.value)}</strong> into ${x.type}.`)
      })).join("");

      const veryStrongCombos = [];
      const hardResistedCombos = [];

      for(const combo of allCombos().filter(c => c.length === 2)){
        let strongRows = [];
        let bestValue = 0;
        let bestRows = [];

        for(const m of members){
          const best = bestAttackInto(m, combo);
          if(best.value > bestValue){
            bestValue = best.value;
            bestRows = [{m,best}];
          } else if(best.value === bestValue){
            bestRows.push({m,best});
          }
          if(best.value >= 2.56) strongRows.push({m,best});
        }

        if(strongRows.length) veryStrongCombos.push({combo, rows:strongRows});
        if(bestValue < 1) hardResistedCombos.push({combo, rows:bestRows, bestValue});
      }

      veryStrongCombos.sort((a,b) => b.rows.length - a.rows.length || a.combo.join("").localeCompare(b.combo.join("")));
      hardResistedCombos.sort((a,b) => a.bestValue - b.bestValue || a.combo.join("").localeCompare(b.combo.join("")));

      $("#dealVeryMoreCombos").innerHTML = veryStrongCombos.slice(0,42).map(x => comboChip(x.combo, x.rows.length, {
        title:`Deal 2.56×+ to ${x.combo.join("/")}`,
        rows:x.rows.map(r => `<strong>${memberName(r.m)}</strong> uses ${r.best.slot} <strong>${r.best.type}</strong> for <strong>${fmt(r.best.value)}</strong>.`)
      }, x.rows.map(r=>r.m.index))).join("");

      if(veryStrongCombos.length > 42){
        $("#dealVeryMoreCombos").innerHTML += `<span class="chip"><span class="badge">+${veryStrongCombos.length - 42}</span></span>`;
      }

      $("#hardResistedCombos").innerHTML = hardResistedCombos.slice(0,42).map(x => comboChip(x.combo, fmt(x.bestValue), {
        title:`Team poor into ${x.combo.join("/")}`,
        rows:x.rows.map(r => `<strong>${memberName(r.m)}</strong>'s best hit is ${r.best.slot} <strong>${r.best.type}</strong> at <strong>${fmt(r.best.value)}</strong>.`)
      }, x.rows.map(r=>r.m.index))).join("");

      if(hardResistedCombos.length > 42){
        $("#hardResistedCombos").innerHTML += `<span class="chip"><span class="badge">+${hardResistedCombos.length - 42}</span></span>`;
      }

      empty("dealMoreGrid","No super-effective single-type coverage yet.");
      empty("dealVeryMoreCombos","No 2.56× dual-type hits yet.");
      empty("teamPoorInto","No single type fully resists your whole active team.");
      empty("attacksResistedBy","No individual attacks are resisted by single types.");
      empty("hardResistedCombos","No dual-type combo fully resists your active team.");
    }

    function render(){
      if(selectedMember !== null && selectedMember >= team.length) selectedMember = null;
      renderTeam();
      renderAnalysis();
      saveTeam();
    }

    function addMember(){
      if(team.length >= 6){ toast("Party full"); return; }
      team.push({ type1:null, type2:null, quick:null, charged:null });
      render();
    }

    function setSocket(memberIndex, field, type){
      const m = team[memberIndex];
      if(!m) return;
      if(field === "type2" && type === m.type1){ toast("Type 2 cannot match Type 1"); return; }
      if(field === "type1" && type === m.type2) m.type2 = null;
      m[field] = type;
      render();
    }

    function clearSocket(memberIndex, field){
      const m = team[memberIndex];
      if(!m) return;
      if(field === "type1"){
        m.type1 = null;
        m.type2 = null;
      } else {
        m[field] = null;
      }
      render();
    }

    function openPicker(socketEl){
      activeSocket = { member:Number(socketEl.dataset.member), field:socketEl.dataset.field };
      $("#pickerTitle").textContent = `Choose ${activeSocket.field}`;
      $("#pickerGrid").innerHTML = TYPES.map(t => `<button class="picker-marble" data-type="${t}">${domMarble(t)}</button>`).join("");
      $("#pickerBackdrop").classList.add("open");
    }

    function closePicker(){
      $("#pickerBackdrop").classList.remove("open");
      activeSocket = null;
    }

    function openDetail(id){
      const detail = details.get(id);
      if(!detail) return;
      $("#detailTitle").textContent = detail.title;
      $("#detailList").innerHTML = detail.rows.map(r => `<div class="detail-item">${r}</div>`).join("");
      $("#detailBackdrop").classList.add("open");
    }

    function closeDetail(){ $("#detailBackdrop").classList.remove("open"); }

    function openShare(){
      $("#teamCode").value = encodeTeam();
      $("#shareBackdrop").classList.add("open");
      setTimeout(() => $("#teamCode").select(), 50);
    }

    function closeShare(){ $("#shareBackdrop").classList.remove("open"); }

    function encodeTeam(){
      return btoa(unescape(encodeURIComponent(JSON.stringify(team))));
    }

    function decodeTeam(code){
      return JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    }

    function saveTeam(){
      try{ localStorage.setItem("goTypeMarblesV5", JSON.stringify(team)); }catch(e){}
    }

    function loadTeam(){
      try{
        const raw = localStorage.getItem("goTypeMarblesV5") || localStorage.getItem("goTypeMarblesV4") || localStorage.getItem("goTypeMarblesV3") || localStorage.getItem("goTypeMarbleTeam");
        if(!raw) return null;
        const parsed = JSON.parse(raw);
        if(Array.isArray(parsed)) return parsed.slice(0,6);
      }catch(e){}
      return null;
    }

    function toast(text){
      const t = $("#toast");
      t.textContent = text;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 1400);
    }

    function init(){
      resizeCanvas();
      rebuildDomMarbleSources();
      render();
      draw();

      window.addEventListener("resize", resizeCanvas);
      canvas.addEventListener("pointerdown", pointerDown, {passive:false});
      canvas.addEventListener("pointermove", pointerMove, {passive:false});
      canvas.addEventListener("pointerup", pointerUp);
      canvas.addEventListener("pointercancel", pointerUp);

      document.addEventListener("pointerdown", beginSocketPointer, {passive:true});
      document.addEventListener("pointermove", moveSocketPointer, {passive:false});
      document.addEventListener("pointerup", endSocketPointer);
      document.addEventListener("pointercancel", endSocketPointer);

      $("#addBtn").addEventListener("click", addMember);
      $("#refillBtn").addEventListener("click", () => { refillHopper(true); toast("Hopper refilled"); });
      $("#shareBtn").addEventListener("click", openShare);

      document.addEventListener("click", e => {
        if(suppressNextClick){
          e.preventDefault();
          e.stopPropagation();
          suppressNextClick = false;
          return;
        }

        const memberEl = e.target.closest(".member");
        if(memberEl && !e.target.closest(".socket") && !e.target.closest("[data-delete]")){
          const idx = Number(memberEl.dataset.member);
          selectedMember = selectedMember === idx ? null : idx;
          render();
          toast(selectedMember === null ? "Team view" : `Focused M${idx+1}`);
          return;
        }

        const socketEl = e.target.closest(".socket");
        if(socketEl) openPicker(socketEl);

        const del = e.target.closest("[data-delete]");
        if(del){
          const idx = Number(del.dataset.delete);
          team.splice(idx, 1);
          if(selectedMember === idx) selectedMember = null;
          else if(selectedMember !== null && selectedMember > idx) selectedMember--;
          render();
        }

        const pick = e.target.closest(".picker-marble");
        if(pick && activeSocket){
          setSocket(activeSocket.member, activeSocket.field, pick.dataset.type);
          closePicker();
        }

        const tab = e.target.closest(".tab");
        if(tab){
          $$(".tab").forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          $$(".panel").forEach(p => p.classList.remove("active"));
          document.getElementById(tab.dataset.tab).classList.add("active");
        }

        const detailChip = e.target.closest("[data-detail]");
        if(detailChip) openDetail(detailChip.dataset.detail);
      });

      $("#closePicker").addEventListener("click", closePicker);
      $("#cancelPicker").addEventListener("click", closePicker);
      $("#pickerBackdrop").addEventListener("click", e => { if(e.target.id === "pickerBackdrop") closePicker(); });
      $("#clearSlot").addEventListener("click", () => {
        if(activeSocket){
          clearSocket(activeSocket.member, activeSocket.field);
          closePicker();
        }
      });

      $("#closeDetail").addEventListener("click", closeDetail);
      $("#detailBackdrop").addEventListener("click", e => { if(e.target.id === "detailBackdrop") closeDetail(); });

      $("#closeShare").addEventListener("click", closeShare);
      $("#shareBackdrop").addEventListener("click", e => { if(e.target.id === "shareBackdrop") closeShare(); });
      $("#copyCode").addEventListener("click", async () => {
        $("#teamCode").select();
        try{
          await navigator.clipboard.writeText($("#teamCode").value);
          toast("Copied");
        }catch(e){
          document.execCommand("copy");
          toast("Copied");
        }
      });
      $("#loadCode").addEventListener("click", () => {
        try{
          const parsed = decodeTeam($("#teamCode").value);
          if(!Array.isArray(parsed)) throw new Error("bad");
          team = parsed.slice(0,6).map(m => ({
            type1:TYPES.includes(m.type1) ? m.type1 : null,
            type2:TYPES.includes(m.type2) ? m.type2 : null,
            quick:TYPES.includes(m.quick) ? m.quick : null,
            charged:TYPES.includes(m.charged) ? m.charged : null
          }));
          render();
          closeShare();
          toast("Loaded");
        }catch(e){
          toast("Invalid code");
        }
      });

      if("serviceWorker" in navigator){
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
        });
      }
    }

    init();
  </script>
</body>
</html>
